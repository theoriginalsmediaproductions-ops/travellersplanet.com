<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #004643;
  --primary-soft: #2C7A7B;
  --bg-main: #FAFAFA;
  --bg-section: #F2F4F3;
  --bg-card: #FFFFFF;
  --border: #E0E5E4;
  --text-primary: #0F1A1A;
  --text-secondary: #5F6F6F;
  --text-muted: #8A9A9A;
  --accent-gold: #C2A46F;
  --accent-gold-bg: rgba(194,164,111,0.12);
  --terra: #9C6B4F;
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-main);
  color: var(--text-primary);
  line-height: 1.7;
  font-size: 16px;
}
h1,h2,h3,h4 { font-family: 'Playfair Display', serif; line-height: 1.2; color: var(--primary); }
h1 { font-size: clamp(2.2rem, 5vw, 3.8rem); font-weight: 900; }
h2 { font-size: clamp(1.8rem, 3vw, 2.6rem); font-weight: 800; }
h3 { font-size: 1.2rem; font-weight: 700; }
p { color: var(--text-secondary); line-height: 1.75; }
a { color: var(--primary); text-decoration: none; transition: color .2s; }
a:hover { color: var(--primary-soft); }

.container { max-width: 1160px; margin: auto; padding: 0 2rem; }
.section { padding: 96px 0; }
.section-light { background: var(--bg-main); }
.section-tint { background: var(--bg-section); }
.section-dark { background: var(--primary); }

.label {
  display: inline-block;
  color: var(--accent-gold);
  font-size: .72rem; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase;
  margin-bottom: 1rem;
}
.label-white { color: rgba(255,255,255,0.6); }

/* ── HEADER ── */
header {
  background: var(--primary);
  position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
nav {
  max-width: 1160px; margin: auto;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 2rem;
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem; font-weight: 800;
  color: #fff; letter-spacing: .01em;
}
.logo span { color: var(--accent-gold); }
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a { color: rgba(255,255,255,0.75); font-size: .88rem; font-weight: 500; transition: color .2s; }
.nav-links a:hover { color: #fff; }
.btn-nav {
  background: var(--accent-gold); color: var(--primary) !important;
  padding: .5rem 1.25rem; border-radius: 8px; font-weight: 700;
  transition: background .2s;
}
.btn-nav:hover { background: #a8894e !important; }

/* ── HERO ── */
.hero {
  min-height: 92vh;
  background:
    linear-gradient(to bottom, rgba(0,70,67,0.72) 0%, rgba(0,70,67,0.45) 60%, rgba(0,70,67,0.72) 100%),
    url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1800&auto=format&fit=crop&q=80') center/cover no-repeat;
  display: flex; align-items: center; justify-content: center; text-align: center;
}
.hero-inner { max-width: 820px; padding: 2rem; }
.hero-pill {
  display: inline-block;
  border: 1px solid var(--accent-gold); color: var(--accent-gold);
  font-size: .72rem; letter-spacing: .2em; text-transform: uppercase;
  padding: .45rem 1.1rem; border-radius: 999px; margin-bottom: 1.8rem;
}
.hero h1 { color: #fff; margin-bottom: 1.2rem; }
.hero h1 em { color: var(--accent-gold); font-style: italic; }
.hero .sub { font-size: 1.1rem; color: rgba(255,255,255,0.72); max-width: 580px; margin: 0 auto 2.5rem; }
.hero-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.btn-primary {
  background: var(--accent-gold); color: var(--primary);
  padding: .9rem 2rem; border-radius: 10px;
  font-weight: 700; font-size: .95rem;
  border: none; cursor: pointer; display: inline-block;
  transition: background .2s, transform .2s;
}
.btn-primary:hover { background: #a8894e; color: var(--primary); transform: translateY(-2px); }
.btn-ghost {
  background: transparent; color: #fff;
  padding: .9rem 2rem; border-radius: 10px;
  font-weight: 600; font-size: .95rem;
  border: 1px solid rgba(255,255,255,0.35); display: inline-block;
  transition: border-color .2s, color .2s, transform .2s;
}
.btn-ghost:hover { border-color: var(--accent-gold); color: var(--accent-gold); transform: translateY(-2px); }
.hero-stats { display: flex; justify-content: center; gap: 3rem; margin-top: 5rem; flex-wrap: wrap; }
.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 2rem; font-weight: 800; color: var(--accent-gold); display: block;
}
.stat-lbl { font-size: .75rem; color: rgba(255,255,255,0.5); letter-spacing: .1em; text-transform: uppercase; }

/* ── WHY US ── */
.why-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
  gap: 28px; margin-top: 3rem;
}
.why-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 2rem;
  box-shadow: 0 4px 20px rgba(0,0,0,0.04);
  transition: transform .3s, box-shadow .3s;
}
.why-card:hover { transform: translateY(-6px); box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
.why-icon {
  width: 44px; height: 44px; border-radius: 10px;
  background: rgba(0,70,67,0.08); display: flex; align-items: center; justify-content: center;
  margin-bottom: 1.1rem; font-size: 1.3rem;
}
.why-card h3 { color: var(--primary); margin-bottom: .4rem; font-size: 1rem; font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: -.02em; }
.why-card p { font-size: .88rem; color: var(--text-secondary); margin: 0; }

/* ── PACKAGES ── */
.pkg-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(320px,1fr));
  gap: 28px; margin-top: 3rem;
}
.pkg-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.04);
  transition: transform .3s, box-shadow .3s;
}
.pkg-card:hover { transform: translateY(-6px); box-shadow: 0 12px 40px rgba(0,0,0,0.10); }
.pkg-img-wrap { overflow: hidden; height: 200px; }
.pkg-img { width: 100%; height: 100%; object-fit: cover; transition: transform .5s; display: block; }
.pkg-card:hover .pkg-img { transform: scale(1.05); }
.pkg-body { padding: 1.4rem; }
.pkg-tags { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .9rem; }
.tag-city {
  background: rgba(0,70,67,0.07); color: var(--primary);
  font-size: .7rem; font-weight: 700; letter-spacing: .04em;
  padding: .28rem .75rem; border-radius: 999px;
}
.tag-off {
  background: var(--accent-gold-bg); color: var(--accent-gold);
  font-size: .7rem; font-weight: 700;
  padding: .28rem .75rem; border-radius: 999px;
}
.pkg-title {
  font-size: 1.05rem; font-weight: 700; color: var(--text-primary);
  font-family: 'Inter', sans-serif; letter-spacing: -.02em; margin-bottom: .35rem;
}
.pkg-route { font-size: .82rem; color: var(--text-muted); margin-bottom: .9rem; }
.pkg-highlights { list-style: none; margin-bottom: 1rem; }
.pkg-highlights li {
  font-size: .82rem; color: var(--text-secondary);
  padding: .22rem 0; padding-left: 1rem; position: relative;
}
.pkg-highlights li::before {
  content: '✓'; position: absolute; left: 0;
  color: var(--primary-soft); font-weight: 700; font-size: .75rem;
}
.pkg-price { margin-bottom: 1rem; }
.pkg-price .old { text-decoration: line-through; color: var(--text-muted); font-size: .85rem; margin-right: .3rem; }
.pkg-price .new { font-size: 1.5rem; font-weight: 800; color: var(--primary); font-family: 'Playfair Display', serif; }
.pkg-price .pp { font-size: .75rem; color: var(--text-muted); }
.pkg-cta {
  display: block; text-align: center;
  background: var(--accent-gold); color: var(--primary);
  padding: .78rem; border-radius: 10px;
  font-weight: 700; font-size: .88rem;
  transition: background .2s;
}
.pkg-cta:hover { background: #a8894e; color: var(--primary); }

/* ── TESTIMONIALS ── */
.testi-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap: 28px; margin-top: 3rem;
}
.testi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 2rem;
  box-shadow: 0 4px 20px rgba(0,0,0,0.04);
}
.testi-stars { color: var(--accent-gold); font-size: .95rem; letter-spacing: .05em; margin-bottom: .9rem; }
.testi-card blockquote { font-size: .9rem; color: var(--text-secondary); font-style: italic; line-height: 1.8; margin-bottom: 1.2rem; }
.testi-name { font-weight: 700; color: var(--text-primary); font-size: .9rem; }
.testi-dest { font-size: .78rem; color: var(--text-muted); }

/* ── CONTACT ── */
.contact-grid {
  display: grid; grid-template-columns: 1fr 1.2fr; gap: 4rem; align-items: start;
}
.contact-info h2 { margin-bottom: 1rem; }
.contact-info p { margin-bottom: 1.5rem; }
.contact-row { display: flex; align-items: center; gap: .9rem; margin-bottom: .9rem; }
.contact-row .ic { font-size: 1.2rem; }
.contact-row span { color: var(--text-secondary); font-size: .92rem; }
