<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Travellers Planet – Thailand Tour Packages</title>

<meta name="description" content="Curated Thailand tour packages starting ₹12,999. Bangkok, Pattaya, Phuket & Krabi.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://thetravellersplanet.com/">

<!-- Open Graph -->
<meta property="og:title" content="The Travellers Planet – Thailand Tour Packages">
<meta property="og:description" content="Curated Thailand tour packages starting ₹12,999.">
<meta property="og:image" content="https://yourdomain.com/preview.jpg">
<meta property="og:type" content="website">
<meta property="og:url" content="https://thetravellersplanet.com">

<!-- Favicon -->
<link rel="icon" href="/favicon.ico">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* VARIABLES */
:root{
--primary:#004643;
--gold:#C2A46F;
--bg:#FAFAFA;
--text:#0F1A1A;
}

/* BASE */
body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.6;
}

.container{
max-width:1100px;
margin:auto;
padding:0 20px;
}

/* HEADER */
header{
background:var(--primary);
position:sticky;
top:0;
z-index:100;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
}

.logo{
color:#fff;
font-weight:700;
}

.nav-links{
display:flex;
gap:20px;
}

.nav-links a{
color:#fff;
font-size:14px;
}

/* MOBILE NAV */
.menu-toggle{
display:none;
color:white;
font-size:22px;
cursor:pointer;
}

/* HERO */
.hero{
min-height:90vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200') center/cover;
color:white;
padding:40px 20px;
}

.hero h1{
font-family:'Playfair Display';
font-size:clamp(2rem,5vw,3rem);
margin-bottom:10px;
}

.hero p{
margin-bottom:20px;
}

/* BUTTONS */
.btn{
display:inline-block;
padding:12px 20px;
border-radius:8px;
font-weight:600;
}

.btn-primary{
background:var(--gold);
color:black;
}

.btn-outline{
border:1px solid white;
color:white;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-top:30px;
}

/* CARD */
.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:15px;
}

/* CONTACT */
.contact{
background:var(--primary);
color:white;
padding:50px 20px;
text-align:center;
}

.contact a{
color:var(--gold);
display:block;
margin-top:10px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
font-size:14px;
}

/* RESPONSIVE */
@media(max-width:768px){

.nav-links{
display:none;
flex-direction:column;
background:var(--primary);
position:absolute;
top:60px;
left:0;
width:100%;
padding:20px;
}

.nav-links.active{
display:flex;
}

.menu-toggle{
display:block;
}

.hero{
min-height:70vh;
}

}

</style>

<!-- STRUCTURED DATA -->
<script type="application/ld+json">
{
"@context":"https://schema.org",
"@type":"TravelAgency",
"name":"The Travellers Planet",
"url":"https://thetravellersplanet.com",
"telephone":"+919625418080"
}
</script>

</head>

<body>

<header>
<nav class="container">
<div class="logo">Travellers Planet</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<div class="nav-links" id="nav">
<a href="#">Home</a>
<a href="#">Packages</a>
<a href="#">Contact</a>
</div>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<div>
<h1>Luxury Thailand Packages</h1>
<p>Bangkok • Pattaya • Phuket • Krabi</p>

<a href="tel:+919625418080" class="btn btn-primary">Call Now</a>
<a href="https://wa.me/919625418080" class="btn btn-outline">WhatsApp</a>
</div>
</section>

<!-- PACKAGES -->
<section class="container" style="padding:60px 0">
<h2>Popular Packages</h2>

<div class="grid">

<div class="card">
<img loading="lazy" src="https://images.unsplash.com/photo-1528181304800-259b08848526?w=800" alt="Phuket Beach">
<div class="card-body">
<h3>Phuket Getaway</h3>
<p>Starting ₹12,999</p>
</div>
</div>

<div class="card">
<img loading="lazy" src="https://images.unsplash.com/photo-1508009603885-50cf7c579365?w=800" alt="Bangkok City">
<div class="card-body">
<h3>Bangkok Explorer</h3>
<p>Starting ₹14,999</p>
</div>
</div>

</div>
</section>

<!-- CONTACT -->
<section class="contact">
<h2>Book Your Trip Now</h2>

<a href="tel:+919625418080">📞 +91 9625418080</a>
<a href="https://wa.me/919625418080">💬 WhatsApp Us</a>
</section>

<footer>
© 2026 The Travellers Planet
</footer>

<script>
function toggleMenu(){
document.getElementById("nav").classList.toggle("active");
}
</script>

</body>
</html>
